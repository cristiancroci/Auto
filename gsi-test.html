<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GSI Test</title>
  <style>
    body{font-family:system-ui,Arial;margin:18px;background:#f6fbff;color:#042033}
    .box{background:#fff;padding:14px;border-radius:10px;box-shadow:0 6px 18px rgba(2,10,20,.06)}
    button{padding:10px 14px;border-radius:8px;border:none;background:#0078d4;color:#fff;font-weight:700;cursor:pointer}
    pre{background:#eef6fb;padding:10px;border-radius:8px;overflow:auto}
    .err{color:#c62828;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <h2>GSI Diagnostic</h2>
    <p id="status">Verifica caricamento script...</p>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="check">Controlla script</button>
      <button id="request">Richiedi token (forza popup)</button>
    </div>
    <h3>Output</h3>
    <pre id="out">—</pre>
    <p class="err" id="err"></p>
    <p style="margin-top:12px;font-size:13px;color:#556">Se il popup non appare: apri la pagina in Chrome (non in-app), abilita popup e disabilita adblock.</p>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    const out = document.getElementById('out');
    const err = document.getElementById('err');
    const status = document.getElementById('status');

    function log(...a){ out.textContent += a.join(' ') + '\\n'; }
    function setErr(t){ err.textContent = t; }

    document.getElementById('check').addEventListener('click', () => {
      out.textContent = '';
      setErr('');
      log('window.google:', !!window.google);
      log('google.accounts:', !!(window.google && window.google.accounts));
      log('google.accounts.oauth2:', !!(window.google && window.google.accounts && window.google.accounts.oauth2));
      log('navigator.userAgent:', navigator.userAgent);
      status.textContent = 'Controllo completato';
    });

    // Replace with your client id (already used in app)
    const CLIENT_ID = '776375898567-ee2jfmfd9cte7dp6fj02k5ubpvag4e29.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

    let tc = null;
    function initTokenClient(){
      try {
        if (!window.google || !google.accounts || !google.accounts.oauth2) {
          throw new Error('GSI non disponibile (script bloccato o non caricato)');
        }
        tc = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: (resp) => {
            log('GSI callback:', JSON.stringify(resp));
            if (resp && resp.error) setErr('Callback error: ' + resp.error);
          }
        });
        log('Token client inizializzato');
      } catch(e){
        setErr(e.message || e);
        log('initTokenClient error:', e.message || e);
      }
    }

    document.getElementById('request').addEventListener('click', async () => {
      out.textContent = '';
      setErr('');
      log('Inizio richiesta token...');
      try {
        initTokenClient();
        if (!tc) throw new Error('Token client non inizializzato');
        tc.requestAccessToken({ prompt: 'consent' });
        log('Richiesta inviata: controlla popup o eventuali messaggi di blocco del browser.');
      } catch (e) {
        setErr('Errore richiesta token: ' + (e && e.message ? e.message : e));
        log('Errore:', e && e.message ? e.message : e);
      }
    });

    // Auto-check dopo caricamento
    window.addEventListener('load', () => {
      setTimeout(()=>document.getElementById('check').click(), 800);
    });
  </script>
</body>
</html>
