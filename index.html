<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Vault</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b1020">
</head>
<body>

  <h1>Password Vault 🔐</h1>

  <div class="form">

    <input id="title" placeholder="Titolo / Servizio">
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password">
    <input id="pin" placeholder="PIN (opzionale)">
    <input id="url" placeholder="URL (opzionale)">
    <textarea id="note" placeholder="Note"></textarea>

    <!-- Bottone Aggiungi / Salva Modifica -->
    <button class="addBtn" onclick="addEntry()">➕ Aggiungi</button>

  </div>

  <h2>Voci salvate</h2>
  <div id="list"></div>

  <!-- Bottone Salva su Drive -->
  <button class="save" onclick="save()">☁️💾 Salva su Drive</button>

  <script src="app.js"></script>
</body>
</html>
