<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vault — Drive Sync</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b2130">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://accounts.google.com https://www.googleapis.com; script-src 'self' https://accounts.google.com https://apis.google.com; connect-src 'self' https://www.googleapis.com; frame-src https://accounts.google.com; style-src 'self' 'unsafe-inline'">
  <style>
    :root{--bg:#eef6fb;--card:#fff;--muted:#6b7b8a;--accent:#00d4ff}
    html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg)}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:100%;max-width:720px;background:var(--card);padding:18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
    h2{margin:0 0 6px 0}
    .muted{color:var(--muted);font-size:13px}
    .row{display:flex;gap:8px;margin-top:12px}
    input,textarea,button{padding:10px;border-radius:8px;border:1px solid #ddd;font-size:15px}
    textarea{resize:vertical}
    .btn{background:linear-gradient(90deg,var(--accent),#7b61ff);color:#021025;border:none;font-weight:700;cursor:pointer}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    #log{background:#f6f8fa;padding:8px;border-radius:8px;overflow:auto;height:120px}
    #msg {position:fixed;left:12px;right:12px;top:12px;z-index:9999;pointer-events:none}
    .toast{display:inline-block;background:#111;color:#fff;padding:8px 12px;border-radius:8px;margin-bottom:8px;opacity:.95;pointer-events:auto}
    .toast.error{background:#c62828}
  </style>
</head>
<body>
  <div id="msg" aria-live="polite"></div>

  <div class="wrap">
    <div class="card" role="main" aria-labelledby="title">
      <h2 id="title">Vault</h2>
      <div class="muted">Sincronizzazione Google Drive — PIN per sblocco</div>

      <div style="margin-top:12px">Stato: <strong id="st-text">non connesso</strong></div>

      <div style="margin-top:12px">
        <label>Imposta PIN (4-8 cifre)</label>
        <div class="row">
          <input id="pin-input" type="password" inputmode="numeric" placeholder="PIN">
          <button id="set-pin" class="btn">Imposta PIN</button>
        </div>
      </div>

      <div class="controls">
        <button id="google-login" class="btn">Connetti Google</button>
        <button id="sync-save" class="btn">Salva su Drive</button>
        <button id="sync-load" class="btn">Carica da Drive</button>
        <button id="lock" class="btn">Blocca</button>
      </div>

      <div style="margin-top:12px">
        <label>Vault JSON</label>
        <textarea id="vault-area" style="width:100%;height:160px;padding:10px;border-radius:8px;border:1px solid #ddd"></textarea>
      </div>

      <div style="margin-top:12px">
        <div class="muted">Log</div>
        <pre id="log"></pre>
      </div>
    </div>
  </div>

  <!-- GSI must load before drive-sync.js -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Crypto helpers -->
  <script src="crypto.js"></script>

  <!-- Drive sync logic -->
  <script src="drive-sync.js"></script>

  <script>
    function toast(text, type='info', ttl=5000){
      const container = document.getElementById('msg');
      const el = document.createElement('div');
      el.className = 'toast' + (type==='error' ? ' error' : '');
      el.textContent = text;
      container.appendChild(el);
      setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),350); }, ttl);
    }

    const logEl = document.getElementById('log');
    function log(...args){ logEl.textContent += args.join(' ') + '\n'; logEl.scrollTop = logEl.scrollHeight; }

    // IMPORTANT: call token request synchronously in click handler
    document.getElementById('google-login').addEventListener('click', () => {
      try {
        // If drive-sync exposed a helper to request token synchronously, use it
        if (window.requestGsiTokenSync) {
          // requestGsiTokenSync will call tokenClient.requestAccessToken immediately
          const ok = window.requestGsiTokenSync();
          if (!ok) throw new Error('Impossibile avviare richiesta token (verifica GSI)');
          document.getElementById('st-text').textContent = 'autenticazione in corso';
          log('Richiesta token inviata (popup dovrebbe aprirsi)');
          toast('Richiesta token inviata');
          return;
        }
        // Fallback: call gdriveInit which may attempt silent; then call interactive
        if (!window.gdriveInit) throw new Error('Modulo drive non caricato');
        window.gdriveInit().then(()=>{ document.getElementById('st-text').textContent = 'Google pronto'; toast('Google pronto'); }).catch(()=>{});
      } catch (e) {
        document.getElementById('st-text').textContent = 'errore connessione';
        log('Errore connessione: ' + (e && e.message ? e.message : JSON.stringify(e)));
        toast('Errore connessione: ' + (e && e.message ? e.message : 'errore'), 'error', 8000);
      }
    });

    document.getElementById('set-pin').addEventListener('click', async () => {
      const pin = document.getElementById('pin-input').value.trim();
      if (!/^\d{4,8}$/.test(pin)) { log('PIN non valido'); toast('PIN non valido', 'error'); return; }
      try {
        if (typeof derivePinHashLocal !== 'function') throw new Error('crypto.js mancante');
        const salt = crypto.getRandomValues(new Uint8Array(12));
        const hash = await derivePinHashLocal(pin, salt);
        localStorage.setItem('vault_pin_salt', btoa(String.fromCharCode(...salt)));
        localStorage.setItem('vault_pin_hash', hash);
        log('PIN impostato'); toast('PIN impostato');
        document.getElementById('pin-input').value = '';
      } catch (e) {
        log('Errore impostazione PIN: ' + (e && e.message ? e.message : e));
        toast('Errore PIN: ' + (e && e.message ? e.message : 'errore'), 'error');
      }
    });

    document.getElementById('sync-save').addEventListener('click', async () => {
      try {
        if (!window.ensureKeyLoaded || !window.saveVaultToDrive) throw new Error('drive-sync non pronto');
        const key = await window.ensureKeyLoaded();
        const plain = document.getElementById('vault-area').value || '{}';
        const enc = await encryptWithKeyB64(key, plain);
        await window.saveVaultToDrive(enc);
        log('Vault salvato su Drive'); toast('Vault salvato su Drive');
      } catch (e) {
        log('Errore salvataggio: ' + (e && e.message ? e.message : JSON.stringify(e)));
        toast('Errore salvataggio: ' + (e && e.message ? e.message : 'errore'), 'error', 8000);
      }
    });

    document.getElementById('sync-load').addEventListener('click', async () => {
      try {
        if (!window.ensureKeyLoaded || !window.loadVaultFromDrive) throw new Error('drive-sync non pronto');
        const key = await window.ensureKeyLoaded();
        const enc = await window.loadVaultFromDrive();
        if (!enc) { log('Nessun vault su Drive'); toast('Nessun vault su Drive'); return; }
        const plain = await decryptWithKeyB64(key, enc);
        document.getElementById('vault-area').value = plain;
        log('Vault caricato e decrittato'); toast('Vault caricato');
      } catch (e) {
        log('Errore caricamento: ' + (e && e.message ? e.message : JSON.stringify(e)));
        toast('Errore caricamento: ' + (e && e.message ? e.message : 'errore'), 'error', 8000);
      }
    });

    document.getElementById('lock').addEventListener('click', () => {
      document.getElementById('st-text').textContent = 'bloccato';
      log('Interfaccia bloccata'); toast('Interfaccia bloccata');
    });
  </script>
</body>
</html>
