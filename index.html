<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vault — PWA + Drive Sync (debug)</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b2130">

  <style>
    :root{--bg:#eef6fb;--card:#fff;--muted:#6b7b8a;--accent1:#00d4ff;--accent2:#7b61ff}
    html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg)}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:100%;max-width:720px;background:var(--card);padding:18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
    h2{margin:0 0 6px 0}
    .muted{color:var(--muted);font-size:13px}
    .row{display:flex;gap:8px;margin-top:12px}
    input,textarea,button{padding:10px;border-radius:8px;border:1px solid #ddd;font-size:15px}
    textarea{resize:vertical}
    .btn{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#021025;border:none;font-weight:700;cursor:pointer}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    #log{background:#f6f8fa;padding:8px;border-radius:8px;overflow:auto;height:120px}
    /* debug overlay */
    #debug-overlay{position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:#fff;border:1px solid #ccc;padding:10px;border-radius:10px;font-family:monospace;font-size:13px;max-height:40vh;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
    #debug-overlay .hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
    #debug-overlay button{font-size:12px;padding:6px 8px;border-radius:6px}
    #debug-overlay.collapsed{max-height:36px;overflow:hidden}
    @media (max-width:520px){
      .card{padding:12px}
      #debug-overlay{left:8px;right:8px;bottom:8px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main" aria-labelledby="title">
      <h2 id="title">Vault</h2>
      <div class="muted">Sincronizzazione Google Drive — PIN per sblocco</div>

      <div style="margin-top:12px">Stato: <strong id="st-text">non connesso</strong></div>

      <div style="margin-top:12px">
        <label>Imposta PIN (4-8 cifre)</label>
        <div class="row">
          <input id="pin-input" type="password" inputmode="numeric" placeholder="PIN">
          <button id="set-pin" class="btn">Imposta PIN</button>
        </div>
      </div>

      <div class="controls">
        <button id="google-login" class="btn">Connetti Google</button>
        <button id="sync-save" class="btn">Salva su Drive</button>
        <button id="sync-load" class="btn">Carica da Drive</button>
        <button id="lock" class="btn">Blocca</button>
      </div>

      <div style="margin-top:12px">
        <label>Vault (JSON)</label>
        <textarea id="vault-area" style="width:100%;height:160px;padding:10px;border-radius:8px;border:1px solid #ddd"></textarea>
      </div>

      <div style="margin-top:12px">
        <div class="muted">Log</div>
        <pre id="log"></pre>
      </div>
    </div>
  </div>

  <!-- Google API must be loaded before drive-sync.js -->
  <script src="https://apis.google.com/js/api.js"></script>

  <!-- Crypto helpers (assume crypto.js present in same folder) -->
  <script src="crypto.js"></script>

  <!-- Drive sync logic (assume drive-sync.js present in same folder) -->
  <script src="drive-sync.js"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    }
  </script>

  <!-- UI glue and debug integration -->
  <script>
    // Simple logger to page
    const logEl = document.getElementById('log');
    function log(...args){ logEl.textContent += args.join(' ') + '\n'; logEl.scrollTop = logEl.scrollHeight; }

    // Prevent multiple debug overlays: remove if exists
    (function ensureSingleDebugOverlay(){
      const existing = document.getElementById('debug-overlay');
      if (existing) existing.remove();
      // create overlay
      const dbg = document.createElement('div');
      dbg.id = 'debug-overlay';
      dbg.innerHTML = `
        <div class="hdr">
          <strong>DEBUG GOOGLE</strong>
          <div>
            <button id="dbg-toggle">Riduci</button>
            <button id="dbg-clear">Pulisci</button>
          </div>
        </div>
        <div id="dbg-body"><div id="dbg-lines">Caricamento debug...</div></div>
      `;
      document.body.appendChild(dbg);
      document.getElementById('dbg-toggle').addEventListener('click', () => {
        dbg.classList.toggle('collapsed');
        document.getElementById('dbg-toggle').textContent = dbg.classList.contains('collapsed') ? 'Espandi' : 'Riduci';
      });
      document.getElementById('dbg-clear').addEventListener('click', () => {
        document.getElementById('dbg-lines').innerHTML = '';
      });
    })();

    function dbg(msg){
      const el = document.getElementById('dbg-lines');
      el.innerHTML += msg + '<br>';
      el.parentElement.scrollTop = el.parentElement.scrollHeight;
    }

    // initial debug state
    dbg('gapi presente? ' + (!!window.gapi));
    if (!window.gapi) {
      dbg('gapi NON presente, provo a caricare api.js...');
      const s = document.createElement('script');
      s.src = 'https://apis.google.com/js/api.js';
      s.onload = () => dbg('api.js caricato, gapi ora presente? ' + (!!window.gapi));
      s.onerror = () => dbg('ERRORE: impossibile caricare api.js');
      document.head.appendChild(s);
    } else {
      dbg('api.js già caricato');
    }

    // Expose a detailed init runner for tablet debugging
    window.runGapiInit = async function(){
      dbg('Avvio runGapiInit...');
      if (!window.gapi) { dbg('gapi non presente, abort'); return; }
      try {
        gapi.load('client:auth2', async () => {
          try {
            dbg('Chiamo gapi.client.init (verifico GAPI_CLIENT_ID e scope)');
            dbg('GAPI_CLIENT_ID presente? ' + (typeof GAPI_CLIENT_ID !== 'undefined'));
            dbg('GAPI_SCOPES: ' + (typeof GAPI_SCOPES !== 'undefined' ? GAPI_SCOPES : 'MANCANTE'));
            await gapi.client.init({ clientId: GAPI_CLIENT_ID, scope: GAPI_SCOPES });
            dbg('gapi.client.init OK');
            document.getElementById('st-text').textContent = 'Google pronto';
          } catch (err) {
            try { dbg('ERRORE init (JSON): ' + JSON.stringify(err)); } catch(e) { dbg('ERRORE init (toString): ' + (err && err.toString ? err.toString() : String(err))); }
            if (err && err.error) dbg('err.error: ' + JSON.stringify(err.error));
            if (err && err.details) dbg('err.details: ' + JSON.stringify(err.details));
            document.getElementById('st-text').textContent = 'errore init';
          }
        });
      } catch(e) {
        dbg('gapi.load throw: ' + (e && e.message ? e.message : String(e)));
      }
    };

    // Wire Connetti Google button to runGapiInit and to existing gdriveInit if present
    document.getElementById('google-login').addEventListener('click', async () => {
      dbg('Connetti Google premuto (azione utente)');
      // first run the debug init to capture errors
      try {
        await runGapiInit();
      } catch(e) {
        dbg('runGapiInit error: ' + (e && e.message ? e.message : String(e)));
      }
      // if drive-sync exposes gdriveInit, call it and log result
      if (window.gdriveInit) {
        try {
          dbg('Chiamo gdriveInit() (drive-sync.js)');
          await gdriveInit();
          dbg('gdriveInit OK');
          document.getElementById('st-text').textContent = 'connesso';
        } catch(e) {
          dbg('gdriveInit failed: ' + (e && e.message ? e.message : JSON.stringify(e)));
        }
      } else {
        dbg('gdriveInit non trovato (drive-sync.js potrebbe non essere caricato)');
      }
    });

    // Basic UI handlers (use functions from drive-sync.js if available)
    const pinInput = document.getElementById('pin-input');
    const setPinBtn = document.getElementById('set-pin');
    const syncSaveBtn = document.getElementById('sync-save');
    const syncLoadBtn = document.getElementById('sync-load');
    const vaultArea = document.getElementById('vault-area');
    const lockBtn = document.getElementById('lock');

    setPinBtn.addEventListener('click', async () => {
      const pin = pinInput.value.trim();
      if (!/^\d{4,8}$/.test(pin)) { log('PIN non valido'); dbg('PIN non valido'); return; }
      const salt = crypto.getRandomValues(new Uint8Array(12));
      const hash = await derivePinHashLocal(pin, salt).catch(e => { dbg('derivePinHashLocal error: ' + e.message); return null; });
      if (!hash) return;
      localStorage.setItem('vault_pin_salt', btoa(String.fromCharCode(...salt)));
      localStorage.setItem('vault_pin_hash', hash);
      log('PIN impostato');
      dbg('PIN impostato localmente');
      pinInput.value = '';
    });

    pinInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const pin = pinInput.value.trim();
        const saltB64 = localStorage.getItem('vault_pin_salt');
        const stored = localStorage.getItem('vault_pin_hash');
        if (!saltB64 || !stored) { dbg('Nessun PIN impostato'); return; }
        const salt = Uint8Array.from(atob(saltB64), c=>c.charCodeAt(0));
        const hash = await derivePinHashLocal(pin, salt).catch(e => { dbg('derivePinHashLocal error: ' + e.message); return null; });
        if (hash === stored) {
          log('Sbloccato'); dbg('Sbloccato con PIN');
          document.getElementById('st-text').textContent = 'sbloccato';
        } else {
          log('PIN errato'); dbg('PIN errato');
        }
        pinInput.value = '';
      }
    });

    lockBtn.addEventListener('click', () => {
      document.getElementById('st-text').textContent = 'bloccato';
      log('Bloccato'); dbg('Interfaccia bloccata');
    });

    // Save/load buttons call drive-sync functions if present, with debug
    syncSaveBtn.addEventListener('click', async () => {
      dbg('Salva su Drive premuto');
      if (!window.saveVaultToDrive) { dbg('saveVaultToDrive non trovato'); return; }
      try {
        const key = await ensureKeyLoaded().catch(e => { dbg('ensureKeyLoaded error: ' + e.message); throw e; });
        const plain = vaultArea.value || '{}';
        const enc = await encryptWithKeyB64(key, plain);
        await saveVaultToDrive(enc);
        dbg('Vault salvato su Drive');
      } catch(e) { dbg('save error: ' + (e && e.message ? e.message : JSON.stringify(e))); }
    });

    syncLoadBtn.addEventListener('click', async () => {
      dbg('Carica da Drive premuto');
      if (!window.loadVaultFromDrive) { dbg('loadVaultFromDrive non trovato'); return; }
      try {
        const key = await ensureKeyLoaded().catch(e => { dbg('ensureKeyLoaded error: ' + e.message); throw e; });
        const enc = await loadVaultFromDrive();
        if (!enc) { dbg('Nessun vault su Drive'); return; }
        const plain = await decryptWithKeyB64(key, enc);
        vaultArea.value = plain;
        dbg('Vault caricato e decrittato');
      } catch(e) { dbg('load error: ' + (e && e.message ? e.message : JSON.stringify(e))); }
    });

    // Small helper to show instructions in debug overlay
    dbg('Interfaccia pronta. Premi "Connetti Google" per iniziare.');
    dbg('Se vedi "ERRORE init" copia qui il contenuto esatto per assistenza.');
  </script>
</body>
</html>
