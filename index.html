<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vault</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #000;
      color: #f2f2f7;
      padding: 12px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 12px;
    }

    .layout {
      display: flex;
      gap: 12px;
    }

    /* Smartphone: impila le colonne */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
    }

    .col {
      flex: 1;
    }

    .card {
      background: #1c1c1e;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 3px;
      display: block;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #3a3a3c;
      background: #2c2c2e;
      color: #fff;
      font-size: 0.85rem;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.7;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 6px;
      cursor: pointer;
    }

    .btn-primary {
      background: #0a84ff;
      color: #fff;
    }

    .btn-secondary {
      background: #3a3a3c;
      color: #fff;
    }

    .item {
      background: #2c2c2e;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .item-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .btn-small {
      flex: 1;
      padding: 6px;
      border-radius: 999px;
      font-size: 0.75rem;
      border: none;
      cursor: pointer;
    }

    .btn-edit { background: #0a84ff; color: #fff; }
    .btn-delete { background: #ff453a; color: #fff; }
  </style>
</head>

<body>
  <h1>Vault</h1>

  <div class="layout">
    <!-- COLONNA SINISTRA -->
    <div class="col">
      <div class="card">
        <label>Titolo</label>
        <input id="titleInput" type="text" placeholder="Es. Gmail">

        <label>Username / Testo</label>
        <input id="usernameInput" type="text" placeholder="Es. nome.utente">

        <label>Password</label>
        <div class="input-wrap">
          <input id="passwordInput" type="password" placeholder="••••••••">
          <span class="eye" data-target="passwordInput">👁️</span>
        </div>

        <label>PIN</label>
        <div class="input-wrap">
          <input id="pinInput" type="password" inputmode="numeric" placeholder="1234">
          <span class="eye" data-target="pinInput">👁️</span>
        </div>

        <label>Note (opzionali)</label>
        <textarea id="notesInput" rows="2" placeholder="Aggiungi note..."></textarea>

        <button class="btn-primary" id="saveBtn">Salva</button>
        <button class="btn-secondary" id="resetBtn">Annulla</button>
      </div>
    </div>

    <!-- COLONNA DESTRA -->
    <div class="col">
      <div class="card">
        <h3 style="margin-top:0;">Voci salvate</h3>
        <div id="itemsContainer"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
