<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vault Preview — PWA + Drive Sync</title>

  <!-- React UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Manifest + theme (relative paths for project page) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root{
      --bg-ice-start:#f7fbfd; --bg-ice-end:#eef6fb;
      --card-dark-1:#0b0f14; --card-dark-2:#0f1419;
      --muted:#9b8f7a; --text-light:#f0f6fb;
      --accent-a:#00d4ff; --accent-b:#7b61ff;
      --glass:rgba(11,33,48,0.04);
    }
    @keyframes accentShift {
      0% { --accent-a: #00d4ff; --accent-b: #7b61ff; }
      33% { --accent-a: #7be0ff; --accent-b: #9b6bff; }
      66% { --accent-a: #a0f0ff; --accent-b: #c07bff; }
      100% { --accent-a: #00d4ff; --accent-b: #7b61ff; }
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg-ice-start),var(--bg-ice-end));color:#0b2130;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial}
    .app-root{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;box-sizing:border-box}
    .container{width:100%;max-width:520px;background:linear-gradient(180deg,rgba(255,255,255,0.95),rgba(250,252,255,0.98));border-radius:16px;padding:18px;box-shadow:0 20px 60px rgba(2,6,23,0.12);border:1px solid rgba(11,33,48,0.04);box-sizing:border-box}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:44px;height:44;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#021025;font-weight:800;background:linear-gradient(135deg,var(--accent-a),var(--accent-b));animation:accentShift 6s linear infinite}
    .muted{color:#6b7b8a;font-size:13px}

    .controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:nowrap}
    .search-input{flex:1 1 auto;min-width:0;height:44px;padding:10px 12px;border-radius:10px;border:1px solid var(--glass);background:transparent;color:#0b2130;box-sizing:border-box}
    .select{flex:0 0 160px;min-width:120px;height:44px;padding:10px 12px;border-radius:10px;border:1px solid var(--glass);background:transparent;color:#0b2130;box-sizing:border-box;appearance:none;padding-right:36px;background-image: linear-gradient(45deg, transparent 50%, rgba(0,0,0,0.12) 50%), linear-gradient(135deg, rgba(0,0,0,0.12) 50%, transparent 50%);background-position: calc(100% - 18px) calc(50% - 6px), calc(100% - 12px) calc(50% - 6px);background-size: 6px 6px, 6px 6px;background-repeat: no-repeat}
    .btn.primary{flex:0 0 auto;height:44px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;color:#021025;background:linear-gradient(90deg,var(--accent-a),var(--accent-b));animation:accentShift 6s linear infinite;border:none;border-radius:10px;font-weight:700;cursor:pointer}
    .btn.small{font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,0,0,0.04);background:transparent}

    .card{width:100%;background:linear-gradient(180deg,var(--card-dark-1),var(--card-dark-2));border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 10px 30px rgba(2,6,23,0.35);color:var(--text-light);margin-bottom:12px;box-sizing:border-box}
    .title{font-weight:700}
    .meta{color:rgba(255,255,255,0.65);font-size:13px;margin-top:6px}
    .row{display:flex;gap:8px;align-items:center;margin-top:12px}
    .field{flex:1;padding:10px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);font-family:ui-monospace,Menlo,monospace;color:var(--text-light)}
    .icon-btn{background:transparent;border:none;padding:8px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.7);display:inline-flex;align-items:center;gap:6px}
    .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

    .modal-backdrop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,0.45);z-index:1000}
    .modal-card{width:92%;max-width:520px;padding:20px;border-radius:14px;background:linear-gradient(180deg,#0b0c0f,#0f1113);border:1px solid rgba(255,255,255,0.02);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    .auth-input{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:rgba(255,255,255,0.02);color:var(--text-light)}
    .toast{position:fixed;right:18px;bottom:18px;background:#021018;color:#eaf6ff;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
    @media(max-width:720px){ .container{padding:14px;margin:8px} .logo{width:40px;height:40} .search-input, .select, .btn.primary { height:40px; font-size:13px; } }
  </style>
</head>
<body>
  <div class="app-root">
    <div class="container" role="main" aria-labelledby="app-title">
      <div class="header">
        <div class="brand">
          <div class="logo">V</div>
          <div>
            <div id="app-title" style="font-weight:800">Vault Preview</div>
            <div class="muted">PWA + Drive Sync</div>
          </div>
        </div>
        <div class="muted">Offline ready</div>
      </div>
<!-- DEBUG: mostra errori JS in pagina -->
<div id="debug-errors" style="position:fixed;left:8px;right:8px;top:8px;z-index:9999;background:#fff6;backdrop-filter:blur(4px);padding:10px;border-radius:8px;max-height:40vh;overflow:auto;font-family:monospace;font-size:13px;color:#000"></div>
<script>
  const dbg = document.getElementById('debug-errors');
  function show(msg){ const p=document.createElement('div'); p.textContent=msg; dbg.appendChild(p); }
  window.addEventListener('error', e => {
    show('Error: ' + (e.message || e.type) + ' — ' + (e.filename || '') + ':' + (e.lineno||'') );
  });
  window.addEventListener('unhandledrejection', e => {
    show('UnhandledRejection: ' + (e.reason && (e.reason.message || e.reason)) );
  });
  // Log resource load failures
  window.addEventListener('load', () => {
    const failed = Array.from(document.querySelectorAll('script,link,img')).filter(el => {
      if (el.tagName === 'SCRIPT') return el.src && !el.complete && el.naturalWidth===undefined && el.readyState!=='complete';
      return false;
    });
    if (failed.length) show('Risorse potenzialmente fallite: ' + failed.map(f=>f.src||f.href).join(', '));
  });
  console.log = (m)=>{ show('LOG: '+ (typeof m === 'object' ? JSON.stringify(m) : m)); };
</script>
      <div id="root">
        <!-- React will mount here -->
        <div style="text-align:center;padding:40px 12px;color:#6b7b8a">
          Caricamento...
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ---------- App code (React UMD) - minimal mount to avoid blank page ---------- */
    const { useState, useEffect } = React;

    function App() {
      const [ready, setReady] = useState(false);
      useEffect(() => {
        // small delay to simulate boot and avoid blank if JS errors occur later
        setTimeout(() => setReady(true), 80);
      }, []);

      if (!ready) {
        return React.createElement('div', { style: { textAlign: 'center', padding: '40px 12px', color: '#6b7b8a' } }, 'Caricamento...');
      }

      return React.createElement('div', null,
        React.createElement('div', { className: 'card' },
          React.createElement('div', { className: 'title' }, 'Vault'),
          React.createElement('div', { className: 'meta' }, 'Connesso a Drive: non ancora autenticato')
        ),
        React.createElement('div', { style: { textAlign: 'center', marginTop: 12 } },
          React.createElement('button', { className: 'btn primary', onClick: () => alert('Apri autenticazione') }, 'Connetti Drive')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>

  <!-- Include drive-sync.js (client-side Google API logic) if present in build -->
  <s

  <!-- Service worker registration (relative path for project page) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(r => console.log('SW registrato', r.scope))
        .catch(e => console.warn('SW failed', e));
    }
  </script>
</body>
</html>
