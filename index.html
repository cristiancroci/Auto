<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manutenzioni Auto</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-512.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Manutenzioni Auto</h1>

    <button id="installBtn" class="install-btn" style="display:none;">Installa App</button>

    <div class="card">
        <label>Tipo intervento</label>
        <input id="tipo" type="text" placeholder="Es. Tagliando">

        <label>Data</label>
        <input id="data" type="date">

        <label>Km</label>
        <input id="km" type="number" placeholder="Es. 120000">

        <label>Note</label>
        <textarea id="note" placeholder="Aggiungi note..."></textarea>

        <button class="btn-primary" onclick="aggiungi()">Aggiungi</button>
    </div>

    <h2>Storico interventi</h2>
    <ul id="lista" class="lista"></ul>

    <script src="app.js"></script>

    <!-- SERVICE WORKER -->
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("pwa-work.js");
    }
    </script>

    <!-- INSTALL BUTTON -->
    <script>
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = "block";
    });

    installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = "none";
    });
    </script>

</body>
</html>
