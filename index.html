<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vault</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page">
    <h1>🔐 Vault</h1>

    <div class="layout">
      <!-- SINISTRA -->
      <div class="card">
        <label>Titolo</label>
        <input id="titleInput" type="text" placeholder="Es. Gmail">

        <label>Username / Testo</label>
        <input id="usernameInput" type="text" placeholder="Es. nome.utente">

        <label>Password</label>
        <div class="input-wrap">
          <input id="passwordInput" type="password" placeholder="••••••••">
          <span class="eye" data-target="passwordInput">👁️</span>
        </div>

        <label>PIN</label>
        <div class="input-wrap">
          <input id="pinInput" type="password" inputmode="numeric" placeholder="1234">
          <span class="eye" data-target="pinInput">👁️</span>
        </div>

        <label>Note (opzionali)</label>
        <textarea id="notesInput" rows="2" placeholder="Aggiungi note..."></textarea>

        <button class="btn-primary" id="saveBtn">💾 Salva</button>
        <button class="btn-secondary" id="resetBtn">↩️ Annulla</button>
      </div>

      <!-- DESTRA -->
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <h3 style="margin:0;">Voci salvate</h3>
          <button class="btn-secondary" id="sortBtn" style="width:auto; padding:6px 14px; font-size:0.8rem;">🔽 Ordina</button>
        </div>

        <div id="itemsContainer"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
