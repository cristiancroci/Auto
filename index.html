<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vault</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- MASTER PASSWORD -->
  <div id="masterOverlay" class="overlay">
    <div class="overlay-card">
      <h2>🔐 Sblocca il Vault</h2>
      <input id="masterInput" type="password" placeholder="Master password">
      <button class="btn-save" id="unlockBtn">🔓 Sblocca</button>
    </div>
  </div>

  <!-- POPUP VISUALIZZA FULLSCREEN -->
  <div id="viewOverlay">
    <div class="view-card">
      <h2 id="viewTitle"></h2>

      <p><b>Username:</b><br><span id="viewUser"></span></p>
      <p><b>Password:</b><br><span id="viewPass"></span></p>
      <p><b>PIN:</b><br><span id="viewPin"></span></p>
      <p><b>Note:</b><br><span id="viewNotes"></span></p>

      <button class="btn-edit" id="viewEdit">✏️ Modifica</button>
      <button class="btn-delete" id="viewDelete">🗑️ Elimina</button>
      <button class="btn-cancel" id="viewClose">❌ Chiudi</button>
    </div>
  </div>

  <div class="page">
    <h1>🔐 Vault</h1>

    <div class="layout">
      <!-- SINISTRA -->
      <div class="card">
        <label>Titolo</label>
        <input id="titleInput" type="text">

        <label>Username</label>
        <input id="usernameInput" type="text">

        <label>Password</label>
        <div class="input-wrap">
          <input id="passwordInput" type="password">
          <span class="eye" data-target="passwordInput">👁️</span>
        </div>

        <label>PIN</label>
        <div class="input-wrap">
          <input id="pinInput" type="password" inputmode="numeric">
          <span class="eye" data-target="pinInput">👁️</span>
        </div>

        <label>Note</label>
        <textarea id="notesInput" rows="2"></textarea>

        <button class="btn-save" id="saveBtn">💾 Salva</button>
        <button class="btn-cancel" id="resetBtn">↩️ Annulla</button>
      </div>

      <!-- DESTRA -->
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <h3 style="margin:0;">Voci salvate</h3>

          <select id="sortSelect" class="sort-select">
            <option value="name-asc">🔤 Nome A→Z</option>
            <option value="name-desc">🔡 Nome Z→A</option>
            <option value="recent">🕒 Più recenti</option>
            <option value="oldest">📁 Più vecchi</option>
          </select>
        </div>

        <div id="itemsContainer"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
