<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manutenzioni Auto</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icona -->
    <link rel="icon" href="icon-512.png" type="image/png">

    <!-- Stile -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Manutenzioni Auto</h1>

    <div class="container">
        <label>Tipo intervento</label>
        <input id="tipo" type="text" placeholder="Es. Tagliando">

        <label>Data</label>
        <input id="data" type="date">

        <label>Km</label>
        <input id="km" type="number" placeholder="Es. 120000">

        <label>Note</label>
        <textarea id="note" placeholder="Aggiungi note..."></textarea>

        <button onclick="aggiungi()">Aggiungi</button>
    </div>

    <h2>Storico interventi</h2>
    <ul id="lista"></ul>

    <script src="app.js"></script>

    <!-- REGISTRAZIONE SERVICE WORKER -->
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("pwa-work.js")
        .then(() => console.log("SW registrato"))
        .catch(err => console.log("Errore SW:", err));
    }
    </script>

</body>
</html>
