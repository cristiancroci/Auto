<script>
/* ---------- App code (React UMD) ---------- */
const { useState, useEffect, useRef, useCallback } = React;

/* Crypto helpers */
const enc = new TextEncoder(), dec = new TextDecoder();
const PBKDF2_ITERATIONS = 200000;
async function deriveKeyRaw(password, salt) {
  const base = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash:'SHA-256' }, base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
function bufToB64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b64ToBuf(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
async function encryptVault(data, password){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKeyRaw(password, salt);
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const blob = new Uint8Array([...salt, ...iv, ...new Uint8Array(ct)]);
  return bufToB64(blob);
}
async function decryptVault(b64, password){
  const buf = b64ToBuf(b64);
  const salt = buf.slice(0,16);
  const iv = buf.slice(16,28);
  const ct = buf.slice(28);
  const key = await deriveKeyRaw(password, salt);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return JSON.parse(dec.decode(plain));
}
async function hashPassword(pw){
  const h = await crypto.subtle.digest('SHA-256', enc.encode(pw + 'vault_salt_2025'));
  return btoa(String.fromCharCode(...new Uint8Array(h)));
}

/* Small Icon */
function Icon({ name, size=18 }){
  const paths = {
    shield: '<path d="M12 2 4 5v6c0 7 8 11 8 11s8-4 8-11V5z"/>',
    eye: '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
    eyeOff: '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8"/><line x1="1" y1="1" x2="23" y2="23"/>',
    copy: '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
    edit: '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
    trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>',
    star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  };
  return React.createElement('svg', { width:size, height:size, viewBox:'0 0 24 24', fill:'none', dangerouslySetInnerHTML:{__html: paths[name] || ''}, stroke:'currentColor', strokeWidth:1.6, strokeLinecap:'round', strokeLinejoin:'round' });
}

/* App */
function App(){
  const VAULT_KEY = 'il_mio_vault_v1';
  const HASH_KEY = 'il_mio_vault_hash_v1';

  const [phase, setPhase] = useState('loading');
  const [masterPw, setMasterPw] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [pwError, setPwError] = useState('');
  const [showMasterPw, setShowMasterPw] = useState(false);
  const [entries, setEntries] = useState([]);
  const [modalState, setModalState] = useState(null);
  const [formData, setFormData] = useState({});
  const [copied, setCopied] = useState(null);
  const [toast, setToast] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('updatedAt');
  const masterRef = useRef(null);
  const lockTimer = useRef(null);
  const AUTO_LOCK_MS = 5 * 60 * 1000;

  useEffect(()=> {
    const hash = localStorage.getItem(HASH_KEY);
    setPhase(hash ? 'login' : 'setup');
  }, []);

  const resetLockTimer = useCallback(()=>{
    if(lockTimer.current) clearTimeout(lockTimer.current);
    lockTimer.current = setTimeout(()=> {
      handleLock();
      showToast('⏱ Vault bloccato automaticamente', 'warn');
    }, AUTO_LOCK_MS);
  }, []);

  const showToast = (msg, type='ok') => {
    setToast({msg,type});
    setTimeout(()=> setToast(null), 2200);
  };

  const saveVault = async (data, pw) => {
    const encrypted = await encryptVault(data, pw);
    localStorage.setItem(VAULT_KEY, encrypted);
  };

  const handleSetup = async () => {
    if(masterPw.length < 8){ setPwError('Minimo 8 caratteri'); return; }
    if(masterPw !== confirmPw){ setPwError('Le password non coincidono'); return; }
    const hash = await hashPassword(masterPw);
    localStorage.setItem(HASH_KEY, hash);
    await saveVault([], masterPw);
    masterRef.current = masterPw;
    setMasterPw('');
    setConfirmPw('');
    setPhase('unlocked');
    setEntries([]);
    resetLockTimer();
    showToast('✅ Vault creato');
  };

  const handleLogin = async () => {
    const hash = await hashPassword(masterPw);
    if(hash !== localStorage.getItem(HASH_KEY)){ setPwError('Password master errata'); return; }
    try{
      const encrypted = localStorage.getItem(VAULT_KEY);
      const data = encrypted ? await decryptVault(encrypted, masterPw) : [];
      setEntries(data || []);
      masterRef.current = masterPw;
      setMasterPw('');
      setPhase('unlocked');
      resetLockTimer();
      setPwError('');
      showToast('🔓 Vault sbloccato');
    } catch(e){
      setPwError('Errore decifratura vault');
    }
  };

  const handleLock = () => {
    setPhase('login');
    masterRef.current = null;
    setEntries([]);
    setModalState(null);
    setMasterPw('');
    if(lockTimer.current) clearTimeout(lockTimer.current);
  };

  const persistEntries = async (newEntries) => {
    setEntries(newEntries);
    const pw = masterRef.current;
    if(pw) await saveVault(newEntries, pw);
    else showToast('⚠ Impossibile salvare: sessione non valida', 'warn');
  };

  const handleSave = async () => {
    if(!formData.title || !formData.title.trim()){ showToast('⚠ Titolo obbligatorio','warn'); return; }
    let newEntries;
    if(modalState?.mode === 'add'){
      const entry = { ...formData, id: crypto.randomUUID(), createdAt: Date.now(), updatedAt: Date.now() };
      newEntries = [entry, ...entries];
      showToast('✅ Voce aggiunta!');
    } else {
      newEntries = entries.map(e => e.id === formData.id ? { ...formData, updatedAt: Date.now() } : e);
      showToast('✅ Voce aggiornata!');
    }
    await persistEntries(newEntries);
    setModalState(null);
    resetLockTimer();
  };

  const handleDelete = async (id) => {
    const newEntries = entries.filter(e => e.id !== id);
    await persistEntries(newEntries);
    setDeleteConfirm(null);
    setModalState(null);
    showToast('🗑 Voce eliminata');
    resetLockTimer();
  };

  const copyToClipboard = async (text, label) => {
    if(!text){ showToast(`Nessun ${label}`,'warn'); return; }
    try{
      await navigator.clipboard.writeText(text);
      setCopied(label);
      showToast(`📋 ${label} copiato!`);
      setTimeout(async ()=> { try{ await navigator.clipboard.writeText(''); }catch{} setCopied(null); }, 8000);
      resetLockTimer();
    } catch(e){ showToast('Errore copia appunti','err'); }
  };

  const filtered = entries.filter(e => {
    if(!search.trim()) return true;
    const q = search.toLowerCase();
    return Object.values(e).some(v => (''+ (v||'')).toLowerCase().includes
